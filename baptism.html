    <body>
        <header>
         <a href="gallery.html">Back to Gallery Page</a>
        <nav class="navbar">

    <div class="menu-toggle" id="menu-toggle">
      ☰
    </div>

    <div class="nav-links" id="nav-links">
           <a href="index.html">Home</a>
            <a href="calendar.html">Calendar</a>
            <a href="prayers_for.html">Prayers</a>

        </nav>
        <div class="overlay" id="overlay"></div>
</header>
<main>
        <h1 class="headline">Event Pictures</h1>
          <h2 class="event_title">Baptisms</h2>
           
          <div wrapper>
                <div class="gallery_card">
                    
                    <img src="img/image1 baptism.jpeg" alt="baptism"/>
                    <img src="img/image0 (2)baptism.jpeg" alt="baptism"/>
                    <img src="img/image0baptism.jpeg" alt="baptism"/>
                    <img src="img/image2 baptism.jpeg" alt="baptism"/>
                    <img src="img/image3baptism.jpeg" alt="baptism"/>
                    <img src="img/image4baptism.jpeg" alt="baptism"/>
                    <img src="img/image5baptism.jpeg" alt="baptism"/>
                </div>
          </div>
                
</main>
<script>
  const toggle = document.getElementById("menu-toggle");
  const navLinks = document.getElementById("nav-links");
  const overlay = document.getElementById("overlay");

  toggle.addEventListener("click", () => {
    navLinks.classList.toggle("active");
    overlay.classList.toggle("active");
  });

  overlay.addEventListener("click", () => {
    navLinks.classList.remove("active");
    overlay.classList.remove("active");
  });
  const images = document.querySelectorAll(".clickable-img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const close = document.getElementById("close");

// Open image
images.forEach(img => {
  img.addEventListener("click", () => {
    lightbox.style.display = "flex";
    lightboxImg.src = img.src;
  });
});

// Close when clicking the X
close.addEventListener("click", () => {
  lightbox.style.display = "none";
});

// Close when clicking outside the image
lightbox.addEventListener("click", () => {
  lightbox.style.display = "none";
});

// Prevent closing when clicking the image itself
lightboxImg.addEventListener("click", (e) => {
  e.stopPropagation();
});
</script>
    </body>
</html>
